<div class="list-header">
  <h1>Blog Posts</h1>
  <a routerLink="/admin/blog/new" class="btn btn-primary">New Post</a>
</div>

@if (loading()) {
  <p>Loading…</p>
} @else {
  <div class="table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Published</th>
          <th>Published at</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (post of posts(); track post.id) {
          <tr>
            <td>{{ post.title }}</td>
            <td>
              <button type="button" class="btn btn-secondary btn-sm" (click)="togglePublish(post)">
                {{ post.published ? 'Published' : 'Draft' }}
              </button>
            </td>
            <td>{{ post.publishedAt ? (post.publishedAt | date: 'mediumDate') : '—' }}</td>
            <td class="admin-table__actions">
              <a [routerLink]="['/admin/blog', post.id, 'edit']" class="btn btn-secondary btn-sm">Edit</a>
              <button type="button" class="btn btn-secondary btn-sm" (click)="remove(post)">Delete</button>
            </td>
          </tr>
        } @empty {
          <tr><td colspan="4">No posts yet.</td></tr>
        }
      </tbody>
    </table>
  </div>
}
