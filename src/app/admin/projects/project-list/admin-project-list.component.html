<div class="list-header">
  <h1>Projects</h1>
  <a routerLink="/admin/projects/new" class="btn btn-primary">New Project</a>
</div>

@if (loading()) {
  <p>Loading…</p>
} @else {
  <div class="table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Published</th>
          <th>Order</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (project of projects(); track project.id; let i = $index) {
          <tr>
            <td>{{ project.title }}</td>
            <td>
              <button type="button" class="btn btn-secondary btn-sm" (click)="togglePublish(project)">
                {{ project.published ? 'Published' : 'Draft' }}
              </button>
            </td>
            <td>
              <div class="order-controls">
                <button type="button" class="btn btn-secondary btn-sm" (click)="move(project, -1)" [disabled]="i === 0">↑</button>
                <button type="button" class="btn btn-secondary btn-sm" (click)="move(project, 1)" [disabled]="i === projects().length - 1">↓</button>
              </div>
            </td>
            <td class="admin-table__actions">
              <a [routerLink]="['/admin/projects', project.id, 'edit']" class="btn btn-secondary btn-sm">Edit</a>
              <button type="button" class="btn btn-secondary btn-sm" (click)="remove(project)">Delete</button>
            </td>
          </tr>
        } @empty {
          <tr><td colspan="4">No projects yet.</td></tr>
        }
      </tbody>
    </table>
  </div>
}
