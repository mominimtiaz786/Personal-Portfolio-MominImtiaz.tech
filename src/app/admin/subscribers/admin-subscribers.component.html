<div class="list-header">
  <h1>Subscribers</h1>
</div>

@if (loading()) {
  <p>Loading…</p>
} @else {
  <div class="table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Email</th>
          <th>Subscribed</th>
        </tr>
      </thead>
      <tbody>
        @for (subscriber of subscribers(); track subscriber.id) {
          <tr>
            <td>{{ subscriber.email }}</td>
            <td>{{ subscriber.subscribedAt | date: 'mediumDate' }}</td>
          </tr>
        } @empty {
          <tr><td colspan="2">No subscribers yet.</td></tr>
        }
      </tbody>
    </table>
  </div>
}
