@if (post$ | async; as post) {
  <section class="section">
    <article class="container blog-detail">
      <a routerLink="/blog" class="blog-detail__back">&larr; All posts</a>
      <h1>{{ post.title }}</h1>
      <time class="blog-detail__date">{{ (post.publishedAt ?? post.date) | date: 'mediumDate' }}</time>
      @if (post.coverImage) {
        <img class="blog-detail__cover" [src]="imageUrl(post.coverImage)" [alt]="post.title" />
      }
      @if (post.body) {
        <div class="rich-text-content" [innerHTML]="sanitize(post.body)"></div>
      }
    </article>
  </section>
} @else {
  <section class="section">
    <div class="container">
      <p>Post not found. <a routerLink="/blog">Back to blog</a></p>
    </div>
  </section>
}
